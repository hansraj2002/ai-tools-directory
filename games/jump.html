<body>

<header>
  <h1>🎮 Jump Cube</h1>
  <nav>
    <a href="/">Home</a>
    <a href="../submit.html">Submit Idea</a>

  </nav>
</header>

<div class="container">

  <div class="card">

    <p>📱 Tap, click, or press <b>Space</b> to jump and avoid obstacles.</p>

    <div id="stage">
      <div id="cube"></div>
    </div>

    <div>
      <button id="start">Start</button>
      <button id="restart">Restart</button>
      <span id="score">Score: 0</span>
    </div>

    <div id="gameOver">Game Over!</div>

  </div>

</div>

<script>

const stage = document.getElementById("stage");
const cube = document.getElementById("cube");

let cubeBottom = 20;
let velocity = 0;
let gravity = -0.6;

let score = 0;
let speed = 3;

let gameInterval, spawnInterval;
let obstacles = [];
let running = false;

// CONTROLS
document.getElementById("start").onclick = startGame;
document.getElementById("restart").onclick = startGame;

document.addEventListener("keydown", e => {
  if(e.code === "Space") jump();
});

stage.addEventListener("click", jump);

// START GAME
function startGame(){
  reset();
  running = true;

  gameInterval = setInterval(gameLoop, 20);
  spawnInterval = setInterval(spawnObstacle, 1200);
}

// RESET
function reset(){
  obstacles.forEach(o=>o.remove());
  obstacles=[];

  cubeBottom=20;
  velocity=0;
  score=0;
  speed=3;

  document.getElementById("score").innerText="Score: 0";
  document.getElementById("gameOver").style.display="none";

  clearInterval(gameInterval);
  clearInterval(spawnInterval);
}

// JUMP
function jump(){
  if(!running) return;

  if(cubeBottom <= 21){
    velocity = 10;
  }
}

// SPAWN OBSTACLE
function spawnObstacle(){
  const ob = document.createElement("div");
  ob.className = "ob";
  ob.style.right = "-40px";
  stage.appendChild(ob);
  obstacles.push(ob);
}

// GAME LOOP
function gameLoop(){

  cubeBottom += velocity;
  velocity += gravity;

  if(cubeBottom <= 20){
    cubeBottom = 20;
  }

  cube.style.bottom = cubeBottom + "px";

  obstacles.forEach((o,i)=>{

    let r = parseFloat(o.style.right);
    o.style.right = (r + speed) + "px";

    let obX = stage.offsetWidth - (r + o.offsetWidth);

    // COLLISION
    if(obX < 80 && obX > 40 && cubeBottom < 50){
      gameOver();
    }

    // SCORE
    if(r > stage.offsetWidth){
      o.remove();
      obstacles.splice(i,1);
      score++;
      speed += 0.1; // increase difficulty

      document.getElementById("score").innerText="Score: "+score;
    }

  });
}

// GAME OVER
function gameOver(){
  running = false;
  clearInterval(gameInterval);
  clearInterval(spawnInterval);

  document.getElementById("gameOver").style.display="block";
}

</script>

</body>
