<header>
  <h1>🚁 Helicopter Rescue</h1>

<div class="container">

<h2>Fly, Dodge & Survive</h2>
<p>Hold SPACE / TAP to fly up. Avoid obstacles and survive as long as possible.</p>

<button id="start">Start Game</button>
<button id="restart">Restart</button>

<canvas id="game" width="800" height="400"></canvas>

<h3 id="score">Score: 0</h3>
<h4 id="best">Best: 0</h4>

<div class="mobile-controls">
  <button id="flyBtn">⬆️ Fly</button>
</div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let heli, obstacles, score, speed, alive, flying, best;

/* ===== INIT ===== */
function init(){
  heli = { x:80, y:200, vy:0 };
  obstacles = [];
  score = 0;
  speed = 4;
  alive = true;
  flying = false;

  best = localStorage.getItem("heli_best") || 0;
  document.getElementById("best").innerText = "Best: " + best;
}

/* ===== CONTROLS ===== */
document.addEventListener("keydown", e=>{
  if(["Space","ArrowUp"].includes(e.code)) flying = true;
});
document.addEventListener("keyup", e=>{
  if(["Space","ArrowUp"].includes(e.code)) flying = false;
});

flyBtn.onmousedown = ()=>flying=true;
flyBtn.onmouseup = ()=>flying=false;
flyBtn.ontouchstart = e=>{flying=true;e.preventDefault();}
flyBtn.ontouchend = ()=>flying=false;

/* ===== START ===== */
document.getElementById("start").onclick = ()=>{
  init();
  loop();
};

document.getElementById("restart").onclick = ()=>{
  init();
  loop();
};

/* ===== SPAWN ===== */
function spawn(){
  const gap = 140;
  const top = Math.random()*200+40;

  obstacles.push({
    x:canvas.width,
    top:top,
    bottom:top+gap,
    width:50
  });
}

setInterval(()=>{ if(alive) spawn(); },1800);

/* ===== DRAW HELI ===== */
function drawHeli(){
  ctx.fillStyle="#4ade80";
  ctx.fillRect(heli.x,heli.y,45,24);

  ctx.fillStyle="#1e293b";
  ctx.fillRect(heli.x+30,heli.y+4,12,16);
}

/* ===== LOOP ===== */
function loop(){
  if(!alive) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* physics */
  heli.vy += 0.4;
  if(flying) heli.vy = -6;
  heli.y += heli.vy;

  if(heli.y<0) heli.y=0;
  if(heli.y>360) heli.y=360;

  drawHeli();

  ctx.fillStyle="#ef4444";

  obstacles.forEach((ob,i)=>{
    ob.x -= speed;

    ctx.fillRect(ob.x,0,ob.width,ob.top);
    ctx.fillRect(ob.x,ob.bottom,ob.width,canvas.height-ob.bottom);

    /* collision */
    if(
      heli.x < ob.x+ob.width &&
      heli.x+45 > ob.x &&
      (heli.y < ob.top || heli.y+24 > ob.bottom)
    ){
      gameOver();
    }

    /* passed */
    if(ob.x+ob.width<0){
      obstacles.splice(i,1);
      score++;
      speed += 0.2; // difficulty increase
    }
  });

  document.getElementById("score").innerText = "Score: "+score;

  requestAnimationFrame(loop);
}

/* ===== GAME OVER ===== */
function gameOver(){
  alive=false;

  if(score > best){
    localStorage.setItem("heli_best",score);
  }

  ctx.fillStyle="#fff";
  ctx.font="40px Arial";
  ctx.fillText("Game Over",canvas.width/2-100,200);
}

init();
</script>
