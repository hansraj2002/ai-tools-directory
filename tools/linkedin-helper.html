<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkedIn Message Improver</title>
</head>

<body>

<h1>💼 LinkedIn Message Improver</h1>

<textarea id="msg" placeholder="Paste your message"></textarea>
<button onclick="improve()">Improve</button>

<p id="result"></p>

<script>
function improve(){
  const msg = document.getElementById("msg").value;

  if(!msg){
    alert("Enter message");
    return;
  }

  document.getElementById("result").innerText =
  "Improved version:\n\n" +
  "Hi, I hope you're doing well. I came across your profile and found it really interesting. " +
  msg + " Looking forward to connecting!";
}
</script>

</body>
</html>
